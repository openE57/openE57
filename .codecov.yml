# Codecov configuration for openE57
# https://docs.codecov.io/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        branches:
          - master
          - main
        if_ci_failed: error

    patch:
      default:
        target: 80%
        threshold: 5%
        only_pulls: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes

ignore:
  - "**/test/**"
  - "**/tests/**"
  - "**/_deps/**"
  - "**/examples/**"
  - "**/tools/**"
  - "**/src/lib/src/openE57las.cpp"  # LAS extension not prioritized

fixes:
  - "src/lib/src/::src/lib/src/"  # Fix path for better coverage mapping
